  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --yellow:#F5C842;--blue:#2563EB;--green:#16A34A;--dark:#111827;
      --mid:#374151;--light:#F9FAFB;--border:#E5E7EB;--radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--light);color:var(--dark);line-height:1.6;}

    /* NAV */
    nav{background:#fff;border-bottom:2px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
    .nav-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;color:var(--dark);text-decoration:none;}
    .nav-logo span{color:var(--blue);}
    .nav-links{display:flex;gap:1.5rem;list-style:none;}
    .nav-links a{font-size:0.9rem;font-weight:600;color:var(--mid);text-decoration:none;transition:color 0.2s;}
    .nav-links a:hover{color:var(--blue);}

    /* LAYOUT */
    .page{max-width:960px;margin:0 auto;padding:2rem 1.5rem;}

    /* BREADCRUMB */
    .breadcrumb{font-size:0.85rem;color:#9CA3AF;margin-bottom:1.5rem;}
    .breadcrumb a{color:var(--blue);text-decoration:none;}

    /* PRODUCT SECTION */
    .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem;}
    @media(max-width:680px){.product-grid{grid-template-columns:1fr;}}

    .product-image-wrap{border-radius:var(--radius);overflow:hidden;background:#fff;border:1.5px solid var(--border);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;}
    .product-image-wrap img{width:100%;height:100%;object-fit:contain;padding:1rem;}

    .product-info{}
    .product-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem;}
    .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
    .badge-green{background:#DCFCE7;color:var(--green);}
    .badge-blue{background:#DBEAFE;color:var(--blue);}
    .badge-yellow{background:#FEF9C3;color:#854D0E;}
    .product-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(1.4rem,4vw,2rem);line-height:1.2;margin-bottom:0.5rem;}
    .product-price{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.8rem;color:var(--blue);margin-bottom:0.75rem;}
    .product-price span{font-size:1rem;color:#9CA3AF;font-weight:400;}
    .product-desc{color:var(--mid);font-size:0.95rem;margin-bottom:1.25rem;line-height:1.7;}

    /* SPECS */
    .specs{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:1.25rem;}
    .spec-item{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:0.6rem 0.75rem;text-align:center;}
    .spec-label{font-size:0.7rem;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
    .spec-value{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;color:var(--dark);}

    /* PRO BUILD BOX */
    .pro-build{background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;}
    .pro-build-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;color:#1E40AF;margin-bottom:0.5rem;}
    .pro-build ul{list-style:none;display:flex;flex-direction:column;gap:3px;}
    .pro-build li{font-size:0.85rem;color:#1E40AF;display:flex;gap:6px;align-items:flex-start;}
    .pro-build li::before{content:'✓';font-weight:700;flex-shrink:0;}

    /* RESERVE FORM */
    .reserve-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;}
    .reserve-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.2rem;margin-bottom:0.4rem;}
    .reserve-sub{font-size:0.9rem;color:var(--mid);margin-bottom:1.25rem;}
    .form-group{margin-bottom:1rem;}
    .form-label{display:block;font-size:0.85rem;font-weight:600;color:var(--mid);margin-bottom:4px;}
    .form-input{width:100%;padding:0.6rem 0.875rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.95rem;font-family:'Inter',sans-serif;color:var(--dark);background:#fff;transition:border-color 0.2s;}
    .form-input:focus{outline:none;border-color:var(--blue);}
    textarea.form-input{resize:vertical;min-height:80px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    @media(max-width:480px){.form-row{grid-template-columns:1fr;}}

    .btn-submit{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:0.875rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:background 0.2s;margin-top:0.25rem;}
    .btn-submit:hover{background:#1D4ED8;}
    .btn-submit:disabled{background:#93C5FD;cursor:not-allowed;}

    .success-msg{display:none;background:#DCFCE7;border:1.5px solid #86EFAC;border-radius:10px;padding:1.25rem;text-align:center;margin-top:1rem;}
    .success-msg h3{font-family:'Nunito',sans-serif;font-weight:800;color:var(--green);margin-bottom:0.4rem;}
    .success-msg p{font-size:0.9rem;color:#166534;}

    /* CONTACT ALTERNATIVES */
    .contact-alts{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
    @media(max-width:480px){.contact-alts{grid-template-columns:1fr;}}
    .contact-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;text-align:center;}
    .contact-card-icon{font-size:1.5rem;margin-bottom:0.5rem;}
    .contact-card-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;margin-bottom:0.25rem;}
    .contact-card-sub{font-size:0.8rem;color:var(--mid);margin-bottom:0.75rem;}
    .btn-contact{display:inline-block;padding:0.5rem 1.25rem;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;text-decoration:none;transition:all 0.2s;}
    .btn-call{background:var(--yellow);color:var(--dark);}
    .btn-call:hover{background:#EAB308;}
    .btn-visit{background:var(--dark);color:#fff;}
    .btn-visit:hover{background:#1F2937;}

    /* NOT FOUND */
    .not-found{text-align:center;padding:4rem 1rem;}
    .not-found h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;margin-bottom:0.75rem;}
    .not-found p{color:var(--mid);margin-bottom:1.5rem;}
    .btn-back{display:inline-block;background:var(--blue);color:#fff;padding:0.6rem 1.5rem;border-radius:8px;text-decoration:none;font-family:'Nunito',sans-serif;font-weight:700;}

    /* FOOTER */
    footer{text-align:center;padding:2rem 1.5rem;color:#9CA3AF;font-size:0.85rem;border-top:1px solid var(--border);}
    footer a{color:#6B7280;text-decoration:none;}
    footer a:hover{color:var(--blue);}
  </style>
</head>

    <div class="not-found">
      <h2>Bike Not Found</h2>
      <p>We couldn't find that bike. Browse our full catalog to find your perfect ride.</p>
      <a href="https://jbirdbikes.com/sales.html" class="btn-back">View All Bikes</a>
    </div>
  `;
}

function submitReservation() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const sku   = document.getElementById('bike-sku').value;
  const title = document.getElementById('bike-title').value;
  const price = document.getElementById('bike-price').value;

  if (!fname || !lname || !phone) {
    alert('Please fill in your name and phone number.');
    return;
  }

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  // Build Google Form prefill URL with reservation details
  const formUrl = `${GOOGLE_FORM}?usp=pp_url` +
    `&entry.name=${encodeURIComponent(fname + ' ' + lname)}` +
    `&entry.phone=${encodeURIComponent(phone)}` +
    `&entry.email=${encodeURIComponent(email)}` +
    `&entry.message=${encodeURIComponent('BIKE RESERVATION: ' + title + ' (' + sku + ') — $' + price + '\n\n' + notes)}`;

  // Open form in background (silent submission attempt)
  fetch(formUrl, { mode: 'no-cors' }).catch(() => {});

  // Show success message regardless — staff will follow up by phone
  setTimeout(() => {
    document.getElementById('success-msg').style.display = 'block';
    btn.style.display = 'none';
    window.scrollTo({ top: document.getElementById('success-msg').offsetTop - 100, behavior: 'smooth' });
  }, 800);
}

// Init — handle both Meta's ?products=SKU:1 format and our ?slug=Gotrax-Nano format
function init() {
  const params = new URLSearchParams(window.location.search);
  
  // Handle Meta's products parameter: ?products=GTX-CM-006%3A1
  const productsParam = params.get('products');
  if (productsParam) {
    // Decode and parse: GTX-CM-006:1
    const decoded = decodeURIComponent(productsParam);
    const productId = decoded.split(':')[0].trim();
    // Find bike by SKU
    const bike = Object.values(CATALOG).find(b => b.sku === productId);
    if (bike) {
      const slug = Object.keys(CATALOG).find(k => CATALOG[k].sku === productId);
      document.title = bike.title + ' | JBird Bikes New Orleans';
      // Handle optional coupon
      const coupon = params.get('coupon') || '';
      renderProduct(slug, bike, coupon);
      return;
    }
  }
  
  // Handle our slug parameter: ?slug=Gotrax-Nano
  const slug = params.get('slug') || '';
  const bike = CATALOG[slug];
  if (bike) {
    document.title = bike.title + ' | JBird Bikes New Orleans';
    renderProduct(slug, bike, '');
  } else {
    renderNotFound();
  }
}

init();
</script>
